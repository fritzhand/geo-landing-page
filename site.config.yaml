meta:
  title: "Your Startup Name"
  tagline: "A short, punchy tagline (6-10 words) that captures your core value prop"
  description: "1-2 sentences describing what your product does, who it's for, and the main benefit. This appears in search results and social shares, so make it compelling. (~150 chars)"
  lang: "en"
  url: "https://yourdomain.com"
  ogImage: "/placeholders/og.png"

branding:
  logo: "/logo.svg"
  logoAlt: "Replace with: [Your Startup Name] Logo"

hero:
  headline: "Your main headline goes here — state your #1 benefit clearly."
  subheadline: "Expand on the headline with 1-2 sentences. Explain the problem you solve, who you solve it for, and why your approach is different. This is the first thing visitors read, so be specific and outcome-focused."
  primaryCta: "Your Main CTA (e.g. 'Get Started Free', 'Join Waitlist', 'Try It Now')"
  secondaryCta: "Secondary CTA (e.g. 'Watch Demo', 'See How It Works', 'Learn More')"
  secondaryCtaLink: "#how-it-works"
  image:
    src: "/product-shot.png"
    alt: "Replace with: a screenshot or mockup of your product's main interface"
  trust:
    metric:
      value: "1,000+"
      label: "A trust metric (e.g. 'users onboarded', 'companies served', 'hours saved')"

socialProof:
  logos:
    - name: "Press/Partner Logo 1 (e.g. a publication, accelerator, or notable customer)"
      src: "/logos/techcrunch.svg"
    - name: "Press/Partner Logo 2"
      src: "/logos/producthunt.svg"
    - name: "Press/Partner Logo 3"
      src: "/logos/yc.svg"
  testimonials:
    - quote: "A real customer quote about the specific result they got. Include numbers if possible (e.g. 'Saved us 20 hours/week' or 'Increased conversion by 35%')."
      author: "Customer Name"
      role: "Their Title, Their Company"
    - quote: "A second testimonial highlighting a different benefit — ease of use, fast setup, great support, etc."
      author: "Customer Name"
      role: "Their Title, Their Company"

productExplanation:
  heading: "A heading for your product walkthrough (e.g. 'See how it works', 'Here's what you get')"
  subheading: "A brief supporting line that sets expectations for the visual walkthrough below."
  steps:
    - image: "/step-1.png"
      caption: "Step 1: Describe the first action users take (e.g. 'Connect your tools with one click')."
    - image: "/step-2.png"
      caption: "Step 2: Describe the core interaction (e.g. 'Configure your settings in plain English')."
    - image: "/step-3.png"
      caption: "Step 3: Describe the outcome (e.g. 'Sit back while everything runs automatically')."

howItWorks:
  heading: "A heading for your step-by-step process (e.g. '3 Steps to Get Started')"
  steps:
    - title: "Step 1 Name (a single verb or short phrase, e.g. 'Connect')"
      description: "1-2 sentences explaining this step. Be specific about what happens and what the user does."
      icon: "Plug"
    - title: "Step 2 Name (e.g. 'Configure')"
      description: "Explain the second step. Highlight what makes it easy or fast."
      icon: "Zap"
    - title: "Step 3 Name (e.g. 'Launch')"
      description: "Explain the payoff step. Focus on the result the user gets."
      icon: "Coffee"

valueBenefits:
  heading: "A heading for your benefits section (e.g. 'Why teams choose [Product]')"
  benefits:
    - title: "Benefit 1: Lead with a number or outcome (e.g. 'Save 20+ Hours/Week')"
      description: "Explain this benefit in 1-2 sentences. Connect it to a real pain point your audience has."
    - title: "Benefit 2: Highlight ease of use (e.g. 'No Learning Curve')"
      description: "Explain why your product is easy to adopt. Compare to alternatives if helpful."
    - title: "Benefit 3: Address a trust concern (e.g. 'Enterprise-Grade Security')"
      description: "Tackle an objection head-on — security, reliability, compliance, or support."
    - title: "Benefit 4: Show breadth (e.g. 'Works With Your Stack')"
      description: "Highlight integrations, flexibility, or extensibility."

pricing:
  heading: "A pricing section heading (e.g. 'Simple, transparent pricing')"
  subheading: "A short reassurance line (e.g. 'Start for free. Upgrade when you're ready.')"
  plans:
    - name: "Free/Starter Tier Name"
      price: "$0"
      period: "/month"
      description: "Who is this tier for? (e.g. 'Perfect for solo founders and side projects')"
      features:
        - "Feature or limit (e.g. '5 projects')"
        - "Feature or limit (e.g. '1,000 API calls/month')"
        - "Support level (e.g. 'Community support')"
        - "What's included (e.g. 'Core integrations')"
      cta: "Free Tier CTA (e.g. 'Start Free')"
      popular: false
    - name: "Mid Tier Name (e.g. 'Growth', 'Pro', 'Team')"
      price: "$XX"
      period: "/month"
      description: "Who is this tier for? (e.g. 'For growing teams ready to scale')"
      features:
        - "Upgraded limit (e.g. 'Unlimited projects')"
        - "Upgraded limit (e.g. '50,000 API calls/month')"
        - "Better support (e.g. 'Priority support')"
        - "More access (e.g. 'All integrations')"
        - "Team feature (e.g. 'Collaboration tools')"
        - "Power feature (e.g. 'Custom webhooks')"
      cta: "Mid Tier CTA (e.g. 'Start Free Trial')"
      popular: true
    - name: "Top Tier Name (e.g. 'Enterprise', 'Business')"
      price: "Custom"
      period: ""
      description: "Who is this tier for? (e.g. 'For teams with advanced security needs')"
      features:
        - "Everything in the mid tier"
        - "Unlimited usage"
        - "Premium support (e.g. 'Dedicated account manager')"
        - "Enterprise feature (e.g. 'SSO & SAML')"
        - "Compliance (e.g. 'SLA guarantee')"
        - "Deployment option (e.g. 'Self-hosted')"
      cta: "Top Tier CTA (e.g. 'Contact Sales')"
      popular: false

faq:
  heading: "FAQ section heading (e.g. 'Frequently Asked Questions')"
  items:
    - question: "What is [Your Product]?"
      answer: "A clear 2-3 sentence explanation of what your product does, who it's for, and what makes it different. Write this for someone who has never heard of you."
    - question: "Is there a free plan?"
      answer: "Explain your free tier or trial. Be specific about what's included and any limits. Mention if no credit card is required."
    - question: "How is this different from [Main Competitor]?"
      answer: "Directly address the comparison your audience is already making. Be honest and specific about your differentiator — don't just say 'we're better'."
    - question: "Is my data secure?"
      answer: "List your specific security measures: encryption, certifications (SOC 2, GDPR), data residency, etc. Be concrete."
    - question: "Can I cancel anytime?"
      answer: "Be straightforward about your cancellation policy. No-contract, no-fee cancellation builds trust."

finalCta:
  heading: "A closing headline that creates urgency (e.g. 'Ready to get started?')"
  subheading: "Reinforce social proof or the main benefit one more time (e.g. 'Join 1,000+ teams already using [Product]')."
  primaryCta: "Final CTA button text (should match your hero CTA)"
  trustSnippet: "A trust-building one-liner (e.g. 'Free forever plan. No credit card required.')"

footer:
  copyright: "2026 Your Company Name"
  links:
    - label: "Privacy Policy"
      href: "/privacy"
    - label: "Terms of Service"
      href: "/terms"
  socials:
    - platform: "Twitter"
      href: "https://twitter.com/yourhandle"
    - platform: "GitHub"
      href: "https://github.com/yourrepo"
    - platform: "LinkedIn"
      href: "https://linkedin.com/company/yourcompany"

waitlist:
  provider: "mock"
