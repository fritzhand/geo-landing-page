faq:
  heading: "Questions? We have answers."
  items:
    - question: "What is AcmeAI?"
      answer: "AcmeAI is a workflow automation platform built specifically for startup founders. It connects your existing tools (Slack, Notion, Linear, GitHub, and 200+ more) and automates repetitive tasks using plain-English instructions."
    - question: "Is there a free plan?"
      answer: "Yes. Our Starter plan is free forever — no credit card required. It includes 5 automations and 1,000 runs per month, which is plenty for solo founders and side projects."
    - question: "How is this different from Zapier?"
      answer: "AcmeAI is built for startup workflows specifically. Instead of visual flowcharts, you describe what you want in plain English. Our AI understands context — it can summarize a Linear sprint, draft a Slack standup, and update a Notion doc, all from one instruction."
    - question: "Is my data secure?"
      answer: "Yes. AcmeAI uses end-to-end encryption, and your data never leaves your infrastructure. We are SOC 2 Type II certified and GDPR compliant."
    - question: "Can I cancel anytime?"
      answer: "Yes. No contracts, no cancellation fees. Downgrade to the free Starter plan anytime and keep your existing automations."

