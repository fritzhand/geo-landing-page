valueBenefits:
  heading: "Why Cultivia's approach wins"
  benefits:
    - title: "Animal-identical function, not a compromise"
      description: "Our proteins are structurally identical to their animal-derived equivalents — same amino acid sequence, same folding, same functional behavior in food applications."
    - title: "Platform extensibility"
      description: "The same strain engineering pipeline works across any secreted protein. We're not locked to one ingredient — every validated strain adds to our IP portfolio."
    - title: "Regulatory-first development"
      description: "We engage with FDA's Generally Recognized as Safe (GRAS) process from day one. CaseinX has received GRAS self-affirmation with independent expert panel review."
    - title: "Equipment-agnostic scale-up"
      description: "Our process runs in standard stainless steel bioreactors used by every major fermentation CMO worldwide — no proprietary hardware dependency or capital risk for partners."

