productExplanation:
  heading: "From gene to ingredient in three stages"
  subheading: "Cultivia's platform takes a protein target from sequence to food-grade ingredient through a validated, scalable pipeline."
  steps:
    - image: "/step-1.png"
      caption: "Gene design: We synthesize and optimize the coding sequence for the target protein using our proprietary codon optimization algorithm."
    - image: "/step-2.png"
      caption: "Strain engineering: The sequence is integrated into our chassis yeast strain via CRISPR, then iteratively improved for yield and stability across 200+ generations."
    - image: "/step-3.png"
      caption: "Scale-up: Validated strains run in standard stainless steel bioreactors. Our process is equipment-agnostic and has been validated from lab to 5,000L pilot scale."

howItWorks:
  heading: "Platform. Pipeline. Partners."
  steps:
    - title: "Platform"
      description: "Our core IP is a yeast strain engineering platform. We build proprietary strains for internal product development and license the platform to CPG and ingredient partners."
      icon: "Cpu"
    - title: "Pipeline"
      description: "Three internal products in development: CaseinX (dairy, pilot scale), OvoAlbumin (egg white, bench scale), and CollaGen (bioactive collagen peptides, discovery)."
      icon: "GitBranch"
    - title: "Partners"
      description: "We partner with food manufacturers who need reliable, scalable supply of animal-identical proteins for product development and commercial supply agreements."
