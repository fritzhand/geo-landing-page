faq:
  heading: "Frequently Asked Questions"
  items:
    - question: "What is precision fermentation?"
      answer: "Precision fermentation is a process that programs microorganisms — typically yeast or bacteria — to produce specific proteins or other molecules. We use food-grade yeast engineered to secrete target proteins into the fermentation broth, which is then filtered and dried into a functional ingredient. The resulting protein is chemically identical to the animal-derived original."
    - question: "What stage is Cultivia at?"
      answer: "We're a seed-stage company (founded 2024). CaseinX is at pilot scale (1,000L validated runs). We've completed independent structural characterization confirming protein identity and are in process for FDA GRAS self-affirmation. We're raising a $12M Series A to fund 10,000L scale-up and first commercial supply agreements."
    - question: "What's the regulatory path?"
      answer: "Precision fermentation ingredients intended for food use in the US require FDA GRAS status. We're pursuing self-affirmation with an independent panel of food science experts — the same path taken by Perfect Day (whey proteins) and Clara Foods. We expect CaseinX GRAS affirmation by Q3 2026."
    - question: "How do you protect your IP?"
      answer: "Our core IP is in our strain engineering process and the specific genetic constructs we've developed. We have two provisional patents filed covering our codon optimization algorithm and our secretion pathway engineering approach. Strains are additionally protected via trade secret."
    - question: "Are you open to partnerships with food manufacturers?"
      answer: "Yes. We're actively seeking two to three food manufacturer partners for co-development agreements on CaseinX — this gives partners preferred pricing and early access to supply in exchange for providing application development data. Please reach out through the contact form to discuss."

