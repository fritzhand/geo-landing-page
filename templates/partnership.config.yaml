howItWorks:
  heading: "Three partner tracks"
  steps:
    - title: "Referral Partner"
      description: "Introduce us to property owners, municipalities, or utilities. Earn a referral fee at financial close and annual commissions on the project's power revenue — typically $25K–$150K per project."
      icon: "Share2"
    - title: "Development Partner"
      description: "Regional developers and EPC contractors who take an active role in project development and permitting. Earn a larger revenue share and preferred access to Meridian's pipeline."
      icon: "Briefcase"
    - title: "Institutional Partner"
      description: "Utilities, REITs, and municipalities seeking a long-term clean energy infrastructure partner. Co-develop a multi-site pipeline with dedicated Meridian support and co-investment options."
      icon: "Building"

valueBenefits:
  heading: "Why infrastructure developers partner with Meridian"
  benefits:
    - title: "No capital at risk for partners"
      description: "Meridian brings all project equity and debt financing. Partners originate deals and manage relationships — we handle the balance sheet risk."
    - title: "White-glove project delivery"
      description: "From permitting to interconnection to commissioning, Meridian handles every technical and regulatory step. Partners don't need in-house solar expertise to offer clean energy solutions."
    - title: "Long-term recurring revenue"
      description: "Projects generate 20–25 year power purchase agreements. Partner commissions are tied to the project's annual generation — a predictable, compounding revenue stream."
    - title: "Proven at scale"
      description: "380 MW deployed across 47 projects in 12 states. Meridian has a track record with investment-grade counterparties, lenders, and utilities that de-risks any new partnership."

