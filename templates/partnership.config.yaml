faq:
  heading: "Partnership FAQ"
  items:
    - question: "What types of organizations does Meridian partner with?"
      answer: "We work with commercial real estate developers and asset managers (office, industrial, retail), municipalities and public agencies, regional utilities seeking clean energy procurement, and EPC contractors who want to offer financed solar to their existing clients."
    - question: "What size projects does Meridian finance?"
      answer: "We focus on behind-the-meter and front-of-meter commercial projects from 500 kW to 20 MW. This includes rooftop, carport, and ground-mount solar paired with battery storage. We can aggregate smaller projects across a portfolio into a single financing structure."
    - question: "Does a partner need solar industry experience?"
      answer: "No. Referral partners only need relationships with property owners or energy buyers — Meridian handles all technical and financial work. Development partners benefit from general real estate or construction experience, but we provide full training and support on the solar-specific aspects."
    - question: "How does partner revenue work?"
      answer: "Referral partners earn a one-time fee at financial close (typically 0.5–1.5% of total project value) plus an annual commission (0.5–1¢/kWh) for 20 years. Development partners earn a larger share of project economics in exchange for their active development role."
    - question: "What geographic markets does Meridian operate in?"
      answer: "We currently operate in 22 states across the US, with concentration in the Mid-Atlantic, Southeast, Texas, and Southwest. We're actively expanding to the Midwest and Pacific Northwest. We evaluate partnership opportunities in all markets and can move into new states with the right partner."
    - question: "How long does it take from partner introduction to a closed project?"
      answer: "Typically 6–12 months from a qualified introduction to financial close, depending on project complexity and permitting timelines. We target first-project delivery within 9 months for most referral partners."

