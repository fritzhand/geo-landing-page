faq:
  heading: "Frequently Asked Questions"
  items:
    - question: "What does Kestrel actually measure?"
      answer: "Kestrel monitors five air quality indicators: PM2.5 particulate matter, CO₂ concentration, total volatile organic compounds (TVOC), relative humidity, and temperature. All five are displayed in real time on your phone."
    - question: "How accurate is the PM2.5 sensor?"
      answer: "We use a Plantower PMS7003 laser particle counter — the same sensor in professional air quality stations. Accuracy is ±15% for PM2.5 at normal indoor concentrations, independently verified in our beta program."
    - question: "Is there a monthly subscription?"
      answer: "No. Kestrel is a one-time purchase. The app, cloud sync, historical data storage, and all future firmware updates are free forever. We make money selling hardware, not locking data behind subscriptions."
    - question: "When will my unit ship?"
      answer: "We're targeting June 2026 for the first production batch of 500 units. Pre-order customers get priority fulfillment. We'll email weekly production updates from manufacturing through delivery."
    - question: "Can I get a refund before it ships?"
      answer: "Yes, full refund any time before we ship your unit. After shipping, we offer a 30-day satisfaction guarantee — return it for any reason for a full refund."
    - question: "Does it work without the app?"
      answer: "Yes. The device has a small e-ink display showing live readings for all 5 metrics. The app adds historical charts, alerts, and smart home integrations, but is not required for basic use."

