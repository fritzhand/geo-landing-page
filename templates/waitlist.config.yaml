howItWorks:
  heading: "How Orbit replaces meeting culture"
  steps:
    - title: "Post"
      description: "Start a structured async thread instead of scheduling a meeting. Orbit's prompts help you give teammates exactly the context they need to contribute meaningfully."
      icon: "Edit"
    - title: "Contribute"
      description: "Team members respond in their own time — written replies, voice notes, or quick reactions. No one is blocked waiting for a slot on a shared calendar."
      icon: "MessageSquare"
    - title: "Decide"
      description: "When threads are resolved, Orbit auto-generates a decision record and notifies stakeholders. Your org builds an institutional knowledge base without any extra work."
      icon: "CheckCircle"

valueBenefits:
  heading: "Why teams are excited"
  benefits:
    - title: "Get 5+ hours back per person per week"
      description: "The average knowledge worker attends 18 hours of meetings weekly. Research shows 70% of those could have been async. Orbit makes that shift frictionless."
    - title: "Deep work by default"
      description: "Orbit's notification model is designed around focus, not interruption. Updates arrive in digests, not pings. Your team gets into flow and stays there."
    - title: "Real-time when it matters"
      description: "Orbit doesn't eliminate synchronous work — it preserves it for creative, high-stakes moments. When you do meet, everyone's prepared and the meeting actually matters."
    - title: "Built for remote-first teams"
      description: "Made for teams across time zones, without forcing 6am calls. Orbit makes your best collaborators available to each other regardless of when or where they work."

faq:
  heading: "Frequently Asked Questions"
  items:
    - question: "When does Orbit launch?"
      answer: "We're targeting a public beta in Q3 2026. Waitlist members get first access and will be onboarded in batches starting with the top of the list. We'll send weekly updates on development progress to everyone who's signed up."
    - question: "Will there be a free plan?"
      answer: "Yes. We'll offer a free tier for small teams (up to 5 people) with core async threading features. Larger teams and advanced features like decision analytics will be on paid plans. We'll share pricing details closer to launch."
    - question: "How is Orbit different from Notion, Loom, or Asana?"
      answer: "Orbit isn't a doc tool, a video tool, or a project tracker — it's a collaboration tool. Where Notion stores documents and Loom records video, Orbit structures the conversation: it's built around a specific workflow of raising topics, gathering input, and making decisions. Think of it as the glue layer between those tools."
    - question: "What integrations will be available at launch?"
      answer: "We're building native integrations with Slack, Notion, GitHub, Linear, and Google Workspace for the initial launch. Full API access will be available to all paid plans."
    - question: "How do I make sure I get early access?"
      answer: "Join the waitlist below. Spots are allocated in order of sign-up, with bonus spots for referrals. Share your unique referral link after signing up to move up the queue."

